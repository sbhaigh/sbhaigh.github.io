baseURL = 'https://stevehaigh.net'
languageCode = 'en-gb'
title = 'Steve Haigh'

[author]
  name = 'Steve Haigh'

[services]
  [services.googleAnalytics]
    id = 'G-7J6788BNY3'

[permalinks]
  pages = "/:slug"

[params]
  logo = '/assets/favicon.svg'
  description = "CTO and engineering leader writing about post-trade automation, digital assets, financial infrastructure, and technology leadership."
  author = 'Steve Haigh'
  items = 10

  [params.comments]
    enabled = true
    githubRepo = 'sbhaigh/sbhaigh.github.io'
    theme = 'github-light'

[menu]
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = "-110"
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = -150
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = -200

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = true
    noHl = false
    style = 'monokailight'
    tabWidth = 4

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML"]

[outputFormats.RSS]
  mediatype = "application/rss"
  baseName = "atom"

[outputFormats.JSON]
  mediatype = "application/json"
  baseName = "feed"

ignoreErrors = ["error-remote-getjson"]

[caches]
  [caches.images]
    dir = ':cacheDir/images'
