{{ $src := .Get "src" }}
{{ if $src }}
<figure class="post-video">
  <video
    controls
    preload="metadata"
    playsinline
    {{ with .Get "poster" }}poster="{{ . }}"{{ end }}
    {{ if eq (.Get "autoplay") "true" }}autoplay muted{{ end }}
    {{ if eq (.Get "loop") "true" }}loop{{ end }}
  >
    <source src="{{ $src }}" type="{{ .Get "type" | default "video/mp4" }}">
    Sorry, your browser does not support embedded videos.
  </video>
  {{ with .Get "caption" }}
  <figcaption>{{ . }}</figcaption>
  {{ end }}
</figure>
{{ else }}
<p>Video shortcode error: missing required src parameter.</p>
{{ end }}
